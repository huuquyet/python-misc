<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tic-Tac-Toe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f0f11;
            font-family: monospace;
            color: white;
        }
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #status {
            font-size: 18px;
            margin-top: 10px;
            color: #00ffcc;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #888;
            pointer-events: none;
        }
    </style>
    <!-- Load Three.js and OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui">
        <h1>3D Tic-Tac-Toe Matrix</h1>
        <div id="status">Player 1's Turn (Red)</div>
    </div>
    <div id="controls-info">Left Click: Place Move | Left Click + Drag: Rotate Camera | Scroll: Zoom</div>

    <script>
        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. Game Logic & Grid Generation ---
        const board = new Array(27).fill(0); // 0: empty, 1: P1(Red), 2: P2(Blue)
        const cubes = [];
        let currentPlayer = 1;
        let gameActive = true;

        const spacing = 1.3;
        const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const edgesGeometry = new THREE.EdgesGeometry(geometry);

        // Generate the 3x3x3 Matrix
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                for (let z = 0; z < 3; z++) {
                    const material = new THREE.MeshPhongMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0.1,
                        side: THREE.DoubleSide
                    });

                    const cube = new THREE.Mesh(geometry, material);
                    
                    // Add wireframe edges for the "matrix" aesthetic
                    const edges = new THREE.LineSegments(edgesGeometry, new THREE.LineBasicMaterial({ color: 0x444444 }));
                    cube.add(edges);

                    // Position cubes and center the grid
                    cube.position.set(
                        (x - 1) * spacing,
                        (y - 1) * spacing,
                        (z - 1) * spacing
                    );

                    // Store index data for game logic
                    cube.userData = { index: x + y * 3 + z * 9, x, y, z };
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }

        // --- 3. Interaction (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', onMouseClick);

        function onMouseClick(event) {
            if (!gameActive) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubes);

            if (intersects.length > 0) {
                const selectedCube = intersects[0].object;
                const index = selectedCube.userData.index;

                // If cell is empty
                if (board[index] === 0) {
                    board[index] = currentPlayer;
                    
                    // Update visuals
                    selectedCube.material.opacity = 0.9;
                    selectedCube.material.color.setHex(currentPlayer === 1 ? 0xff3333 : 0x3333ff);
                    
                    if (checkWin()) {
                        document.getElementById('status').innerText = `Player ${currentPlayer} Wins!`;
                        document.getElementById('status').style.color = currentPlayer === 1 ? '#ff3333' : '#3333ff';
                        gameActive = false;
                    } else if (!board.includes(0)) {
                        document.getElementById('status').innerText = "Draw! The matrix is full.";
                        document.getElementById('status').style.color = '#ffffff';
                        gameActive = false;
                    } else {
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn (${currentPlayer === 1 ? 'Red' : 'Blue'})`;
                        document.getElementById('status').style.color = currentPlayer === 1 ? '#ff3333' : '#3333ff';
                    }
                }
            }
        }

        // --- 4. Win Logic Calculation ---
        function checkWin() {
            const lines = [];
            
            // Generate all 49 winning lines dynamically
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    lines.push([i + j * 3 + 0 * 9, i + j * 3 + 1 * 9, i + j * 3 + 2 * 9]); // Z axis
                    lines.push([i + 0 * 3 + j * 9, i + 1 * 3 + j * 9, i + 2 * 3 + j * 9]); // Y axis
                    lines.push([0 + i * 3 + j * 9, 1 + i * 3 + j * 9, 2 + i * 3 + j * 9]); // X axis
                }
                // 2D Face Diagonals
                lines.push([0 + i * 3 + 0 * 9, 1 + i * 3 + 1 * 9, 2 + i * 3 + 2 * 9]); 
                lines.push([2 + i * 3 + 0 * 9, 1 + i * 3 + 1 * 9, 0 + i * 3 + 2 * 9]); 
                lines.push([i + 0 * 3 + 0 * 9, i + 1 * 3 + 1 * 9, i + 2 * 3 + 2 * 9]); 
                lines.push([i + 2 * 3 + 0 * 9, i + 1 * 3 + 1 * 9, i + 0 * 3 + 2 * 9]); 
                lines.push([0 + 0 * 3 + i * 9, 1 + 1 * 3 + i * 9, 2 + 2 * 3 + i * 9]); 
                lines.push([2 + 0 * 3 + i * 9, 1 + 1 * 3 + i * 9, 0 + 2 * 3 + i * 9]); 
            }
            // 3D Space Diagonals (Corner to opposite corner through the center)
            lines.push([0 + 0 * 3 + 0 * 9, 1 + 1 * 3 + 1 * 9, 2 + 2 * 3 + 2 * 9]);
            lines.push([2 + 0 * 3 + 0 * 9, 1 + 1 * 3 + 1 * 9, 0 + 2 * 3 + 2 * 9]);
            lines.push([0 + 2 * 3 + 0 * 9, 1 + 1 * 3 + 1 * 9, 2 + 0 * 3 + 2 * 9]);
            lines.push([2 + 2 * 3 + 0 * 9, 1 + 1 * 3 + 1 * 9, 0 + 0 * 3 + 2 * 9]);

            // Check if any line has 3 matching player stones
            for (let line of lines) {
                const [a, b, c] = line;
                if (board[a] !== 0 && board[a] === board[b] && board[a] === board[c]) {
                    // Highlight the winning line
                    cubes[a].scale.set(1.2, 1.2, 1.2);
                    cubes[b].scale.set(1.2, 1.2, 1.2);
                    cubes[c].scale.set(1.2, 1.2, 1.2);
                    return true;
                }
            }
            return false;
        }

        // --- 5. Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for OrbitControls damping
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
